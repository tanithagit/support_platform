<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Chat Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        input { width: 70%; padding: 8px; }
        button { padding: 8px 16px; margin-left: 5px; }
        .system { color: gray; font-style: italic; }
        .message { color: black; margin: 5px 0; }
        .connected { color: green; font-weight: bold; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>WebSocket Chat Test</h2>

    <!-- Login Section -->
    <div>
        <h3>Step 1: Login</h3>
        <input id="email" placeholder="Email" value="customer@test.com" />
        <input id="password" placeholder="Password" value="customer123" type="password" />
        <button onclick="login()">Login</button>
        <p id="login_status"></p>
    </div>

    <!-- Connect Section -->
    <div>
        <h3>Step 2: Connect to Ticket Chat</h3>
        <input id="ticket_id" placeholder="Ticket ID" value="1" style="width:100px" />
        <button onclick="connectWS()">Connect</button>
        <p id="connect_status"></p>
    </div>

    <!-- Chat Section -->
    <div>
        <h3>Step 3: Chat</h3>
        <div id="messages"></div>
        <input id="msg_input" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        let token = null
        let ws = null

        // Add message to chat window
        function addMessage(text, type = 'message') {
            const div = document.createElement('div')
            div.className = type
            div.textContent = text
            document.getElementById('messages').appendChild(div)
            document.getElementById('messages').scrollTop = 999999
        }

        // Step 1: Login
        async function login() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value

            try {
                const res = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                })
                const data = await res.json()

                if (data.access_token) {
                    token = data.access_token
                    document.getElementById('login_status').textContent = '✅ Logged in as ' + data.user.full_name
                    document.getElementById('login_status').style.color = 'green'
                } else {
                    document.getElementById('login_status').textContent = '❌ Login failed: ' + JSON.stringify(data)
                    document.getElementById('login_status').style.color = 'red'
                }
            } catch (err) {
                document.getElementById('login_status').textContent = '❌ Error: ' + err.message
                document.getElementById('login_status').style.color = 'red'
            }
        }

        // Step 2: Connect WebSocket
        function connectWS() {
            if (!token) {
                alert('Please login first!')
                return
            }

            const ticketId = document.getElementById('ticket_id').value
            ws = new WebSocket(`ws://localhost:8000/ws/${ticketId}?token=${token}`)

            ws.onopen = () => {
                document.getElementById('connect_status').textContent = '✅ Connected to ticket #' + ticketId
                document.getElementById('connect_status').style.color = 'green'
                addMessage('Connected to chat!', 'connected')
            }

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data)
                if (data.type === 'system') {
                    addMessage('🔔 ' + data.message, 'system')
                } else {
                    addMessage('💬 ' + data.sender_name + ': ' + data.content, 'message')
                }
            }

            ws.onerror = (e) => {
                addMessage('❌ Connection error!', 'error')
                document.getElementById('connect_status').textContent = '❌ Connection failed'
                document.getElementById('connect_status').style.color = 'red'
            }

            ws.onclose = () => {
                addMessage('🔌 Disconnected', 'system')
            }
        }

        // Step 3: Send message
        function sendMessage() {
            const input = document.getElementById('msg_input')
            const content = input.value.trim()

            if (!content) return
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Not connected! Please connect first.')
                return
            }

            ws.send(JSON.stringify({ content }))
            input.value = ''
        }

        // Send on Enter key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage()
        })
    </script>
</body>
</html>
